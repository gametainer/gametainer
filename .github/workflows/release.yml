name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for manual artifacts, for example v0.1.0-dev.1"
        required: false
        default: ""
  push:
    tags:
      - "v*"
      - "dev-*"

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            zigbuild: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            zigbuild: true
          - target: x86_64-apple-darwin
            runner: macos-26-intel
            zigbuild: false
          - target: aarch64-apple-darwin
            runner: macos-26
            zigbuild: false
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            zigbuild: false
          - target: aarch64-pc-windows-msvc
            runner: windows-2025
            zigbuild: false

    steps:
      - uses: actions/checkout@v7

      - name: Install SOPS
        uses: mdgreenwald/mozilla-sops-action@v2.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Decrypt repository
        shell: bash
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          set -euo pipefail
          ./scripts/git-sops.sh -b init
          ./scripts/git-sops.sh -b decrypt

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.zigbuild
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        shell: bash
        run: cargo install cargo-zigbuild --locked

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.zigbuild }}" == "true" ]]; then
            cargo zigbuild --release --locked -p gametainer -p gamer --target "${{ matrix.target }}"
          else
            cargo build --release --locked -p gametainer -p gamer --target "${{ matrix.target }}"
          fi

      - name: Package
        shell: bash
        env:
          GAMETAINER_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/package-release.sh "${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gametainer-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: publish GitHub release
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
          prerelease: ${{ contains(github.ref_name, 'dev') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
